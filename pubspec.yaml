name: project1
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.9.2

dependencies:
  # Core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Network & APIs
  http: ^1.1.0
  dio: ^5.4.0
  http_parser: ^4.0.2

  # Storage & Caching
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1  # ✅ مهم للتخزين المؤقت للصور

  # Files & Storage
  file_picker: ^8.1.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  flutter_downloader: ^1.11.6
  open_filex: ^4.4.0
  gal: ^2.3.0

  # UI & Utils
  logger: ^2.5.0
  intl: ^0.20.2
  provider: ^6.1.1
  cupertino_icons: ^1.0.8

  # Firebase & Services
  firebase_core: ^4.4.0
  local_auth: ^3.0.0
  geocoding: ^3.0.0
  geolocator: ^13.0.1

  # PDF & URL
  flutter_pdfview: ^1.3.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai/Almarai-Bold.ttf
          weight: 700
  assets:
    - assets/full_logo.png
  uses-material-design: true